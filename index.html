<!DOCTYPE html>
<html>
<head>
<title>Special Gift</title>
<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

.page{
display:none;
padding-top:100px;
}

.active{
display:block;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
background:pink;
color:black;
cursor:pointer;
border-radius:10px;
}

img{
width:120px;
margin:10px;
border-radius:10px;
}

.photos{
margin-top:40px;
}

.arrow{
font-size:40px;
cursor:pointer;
margin-top:40px;
}

.flower{
font-size:60px;
animation:grow 3s infinite alternate;
}

@keyframes grow{
from{
transform:scale(0.5);
}
to{
transform:scale(1.2);
}
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>Something for you ❤️</h1>

<p>I hope you will love my small gift</p>

<br>

<button onclick="nextPage(2)">Next</button>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<h1>Letter For You 💌</h1>

<p style="width:70%;margin:auto;font-size:20px">

You are very special to me.  
Every moment with you feels beautiful.  
This is just a small gift but it comes from my heart.  

I hope this brings a smile to your face 😊

</p>

<div class="arrow" onclick="nextPage(3)">⬇</div>

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>Memories 📸</h1>

<div class="photos">

<img src="photo1.jpg.jpeg">
<img src="photo2.jpg.jpeg">
<br>
<img src="photo3.jpg.jpeg">
<img src="photo4.jpg.jpeg">

</div>

<br><br>

<div class="flower">🌸</div>

<p>For You</p>

</div>


<script>

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById("page"+page).classList.add("active")

}

</script>

</body>
</html>
