<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Teju</title>

<style>
body{
background:linear-gradient(pink, lavender);
text-align:center;
font-family:Arial;
}

h1{
color:red;
font-size:45px;
margin-top:40px;
}

#msg{
font-size:24px;
color:purple;
margin-top:20px;
}

button{
padding:15px;
font-size:20px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

img{
width:250px;
border-radius:20px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Happy Birthday Teju 🎂</h1>

<img src="photo.jpg">

<br><br>

<button onclick="start()">Open Gift 🎁</button>

<p id="msg"></p>

<br>

<audio controls autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let text="You are the most special friend in my life 💖 Happy Birthday Teju! May all your dreams come true 🎉";
let i=0;

function start(){
let speed=60;
function typing(){
if(i<text.length){
document.getElementById("msg").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

</script>

</body>
</html>
